# Defaults plus a short errcheck exclude list: terminal prints and response
# body closes have no useful error to handle.
version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*github.com/tamnd/tomo/pkg/store.Store).Close
        - (*github.com/tamnd/tomo/pkg/policy.FileAuditor).Close
        - (*github.com/coder/websocket.Conn).Close
